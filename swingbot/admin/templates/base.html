<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }} — Swing Bot Admin</title>
<link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/favicon.svg') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32.png') }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Inter: a professional, highly-legible UI typeface built for exactly this
     kind of dense data/dashboard interface -- replaces the previous plain
     system-font stack. The full CSS font stack in style.css still falls
     back to system fonts if this fails to load (offline/blocked network),
     so the page never breaks, it just looks slightly plainer. -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script>
// Applied in <head>, before the body paints, so the page renders at the
// saved zoom level from the very first frame instead of flashing at 100%
// and then jumping to the saved size once the bottom-of-body script runs.
(function() {
  try {
    var saved = parseFloat(localStorage.getItem('adminFontZoom'));
    if (saved && saved > 0) {
      document.documentElement.style.zoom = saved;
    }
  } catch (e) {}
})();
</script>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img class="brand-avatar"
           src="{{ url_for('static', filename='images/bot-profile.png') }}"
           srcset="{{ url_for('static', filename='images/bot-profile.png') }} 1x, {{ url_for('static', filename='images/bot-profile@2x.png') }} 2x"
           alt="" title="CEO &amp; COO">
      <div class="brand-row">
        <span class="logo">📈</span>
        <span class="brand-text">Swing Bot</span>
      </div>
    </div>
    <nav>
      {% for key, icon, label, endpoint in nav_items %}
      <a href="{{ url_for(endpoint) }}" class="{{ 'active' if key == active_page else '' }}">
        <span class="icon">{{ icon }}</span>
        <span class="nav-label">{{ label }}</span>
      </a>
      {% endfor %}
    </nav>
    <div class="font-size-control" title="Adjust the page's overall text/UI size">
      <button type="button" id="font-size-dec" aria-label="Decrease font size">A&#8722;</button>
      <span id="font-size-label">100%</span>
      <button type="button" id="font-size-inc" aria-label="Increase font size">A&#43;</button>
    </div>
    <div class="sidebar-footer">
      {{ now }}
      {% if versions %}
      <div class="version-tag" title="UI: {{ versions.ui }}&#10;Swing bot: {{ versions.bot }}">
        UI v{{ versions.ui }} &middot; Bot v{{ versions.bot }}
      </div>
      {% endif %}
    </div>
  </aside>

  <div class="content">
    <div class="page-header">
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
      <h1>{{ title }}</h1>
    </div>
    {% if msg %}
      <div class="banner {{ 'ok' if ok == '1' else 'err' }}">{{ msg }}</div>
    {% endif %}
    {% block body %}{% endblock %}
  </div>
</div>

<script>
(function () {
  var sidebar   = document.getElementById('sidebar');
  var overlay   = document.getElementById('sidebar-overlay');
  var hamburger = document.getElementById('hamburger');
  if (!sidebar || !overlay || !hamburger) return;

  function openSidebar() {
    sidebar.classList.add('open');
    overlay.classList.add('active');
    hamburger.setAttribute('aria-expanded', 'true');
    hamburger.innerHTML = '&#10005;';
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
    hamburger.setAttribute('aria-expanded', 'false');
    hamburger.innerHTML = '&#9776;';
  }

  hamburger.addEventListener('click', function () {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  overlay.addEventListener('click', closeSidebar);

  sidebar.querySelectorAll('nav a').forEach(function (a) {
    a.addEventListener('click', closeSidebar);
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeSidebar();
  });
})();

// ---- Font/UI size control -------------------------------------------------
// Uses CSS `zoom` (not a `transform: scale`) so it genuinely scales the
// whole page -- text, padding, icons, chart canvases -- the same way
// browser-level page zoom does, rather than just the text. Persisted in
// localStorage and re-applied instantly in <head> (see the inline script
// up there) on every subsequent page load, so it's a one-time-per-browser
// setting, not something you have to redo on every page.
(function () {
  var MIN = 0.8, MAX = 1.5, STEP = 0.1;
  var decBtn = document.getElementById('font-size-dec');
  var incBtn = document.getElementById('font-size-inc');
  var label  = document.getElementById('font-size-label');
  if (!decBtn || !incBtn || !label) return;

  function currentZoom() {
    var z = parseFloat(document.documentElement.style.zoom);
    return z && z > 0 ? z : 1.0;
  }
  function applyZoom(z) {
    z = Math.round(Math.min(MAX, Math.max(MIN, z)) * 100) / 100;
    document.documentElement.style.zoom = z;
    label.textContent = Math.round(z * 100) + '%';
    try { localStorage.setItem('adminFontZoom', z); } catch (e) {}
    decBtn.disabled = z <= MIN;
    incBtn.disabled = z >= MAX;
  }

  decBtn.addEventListener('click', function () { applyZoom(currentZoom() - STEP); });
  incBtn.addEventListener('click', function () { applyZoom(currentZoom() + STEP); });

  applyZoom(currentZoom());
})();
</script>
</body>
</html>
