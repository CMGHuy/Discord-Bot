<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }} — Swing Bot Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Inter: a professional, highly-legible UI typeface built for exactly this
     kind of dense data/dashboard interface -- replaces the previous plain
     system-font stack. The full CSS font stack in style.css still falls
     back to system fonts if this fails to load (offline/blocked network),
     so the page never breaks, it just looks slightly plainer. -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="logo">📈</span>
      <span class="brand-text">Swing Bot</span>
    </div>
    <nav>
      {% for key, icon, label, endpoint in nav_items %}
      <a href="{{ url_for(endpoint) }}" class="{{ 'active' if key == active_page else '' }}">
        <span class="icon">{{ icon }}</span>
        <span class="nav-label">{{ label }}</span>
      </a>
      {% endfor %}
    </nav>
    <div class="sidebar-footer">
      {{ now }}
      {% if versions %}
      <div class="version-tag" title="UI: {{ versions.ui }}&#10;Swing bot: {{ versions.bot }}">
        UI v{{ versions.ui }} &middot; Bot v{{ versions.bot }}
      </div>
      {% endif %}
    </div>
  </aside>

  <div class="content">
    <div class="page-header">
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
      <h1>{{ title }}</h1>
    </div>
    {% if msg %}
      <div class="banner {{ 'ok' if ok == '1' else 'err' }}">{{ msg }}</div>
    {% endif %}
    {% block body %}{% endblock %}
  </div>
</div>

<script>
(function () {
  var sidebar   = document.getElementById('sidebar');
  var overlay   = document.getElementById('sidebar-overlay');
  var hamburger = document.getElementById('hamburger');
  if (!sidebar || !overlay || !hamburger) return;

  function openSidebar() {
    sidebar.classList.add('open');
    overlay.classList.add('active');
    hamburger.setAttribute('aria-expanded', 'true');
    hamburger.innerHTML = '&#10005;';
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
    hamburger.setAttribute('aria-expanded', 'false');
    hamburger.innerHTML = '&#9776;';
  }

  hamburger.addEventListener('click', function () {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  overlay.addEventListener('click', closeSidebar);

  sidebar.querySelectorAll('nav a').forEach(function (a) {
    a.addEventListener('click', closeSidebar);
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeSidebar();
  });
})();
</script>
</body>
</html>
